<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Final Archaeology Battle</title>
    <style>
        :root {
            --paleo: #8d6e63;
            --neo: #5d4037;
            --metal: #455a64;
            --bubble-width: clamp(88px, 10vw, 130px);
            --bubble-height: clamp(64px, 8vw, 90px);
            --header-padding: clamp(8px, 1.2vw, 10px);
            --bank-height: clamp(120px, 20vh, 180px);
            --bank-gap: clamp(6px, 1vw, 10px);
            --bank-padding: clamp(6px, 1vw, 10px);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            overflow: hidden; font-family: "Century Gothic", Futura, sans-serif;
            background-color: #2b1a0a; touch-action: none; user-select: none;
        }
        #game-container {
            display: flex; width: 100vw; height: 100vh; height: 100dvh;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Archaeological_dig_site.jpg/1200px-Archaeological_dig_site.jpg');
            background-size: cover; background-position: center;
        }
        .team-section {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            border: 4px solid #d35400;
            position: relative;
        }
        .header {
            text-align: center;
            color: white;
            padding: var(--header-padding);
            background: rgba(0,0,0,0.85);
            border-bottom: 4px solid gold;
        }
        .header h2 {
            margin: 0;
            font-size: clamp(1.2rem, 2vw, 1.6rem);
        }
        .score {
            margin-top: 4px;
            font-size: clamp(0.95rem, 1.6vw, 1.1rem);
        }
        .play-area {
            flex: 1;
            min-height: 0;
            position: relative;
        }
        .banks {
            display: flex;
            height: var(--bank-height);
            gap: var(--bank-gap);
            padding: var(--bank-padding);
            background: rgba(0,0,0,0.9);
        }
        .bank {
            flex: 1;
            min-width: 0;
            border-radius: 15px;
            border: 2px solid #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: var(--bank-padding);
            color: white;
        }
        .bank-title { font-weight: bold; margin-bottom: 5px; font-size: clamp(0.88rem, 1.4vw, 1rem); color: #ffeb3b; }
        .paleo-bank { background-color: var(--paleo); }
        .neo-bank { background-color: var(--neo); }
        .metal-bank { background-color: var(--metal); }

        .word-bubble {
            position: absolute; width: var(--bubble-width); height: var(--bubble-height);
            background: #5d4037; border-radius: 15px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; color: transparent; border: 3px dashed #3e2723;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5); z-index: 10;
            padding: 4px;
            box-sizing: border-box;
            text-align: center;
        }
        /* Reveal State */
        .word-bubble.revealed { background: white; color: black; border: 3px solid #333; }
        .word-bubble span:first-child { font-size: clamp(1.5rem, 2.6vw, 2.2rem); display: none; pointer-events: none;}
        .word-bubble.revealed span:first-child { display: block; }
        .word-bubble span:last-child { pointer-events: none; font-size: clamp(0.75rem, 1.3vw, 0.95rem); line-height: 1.1; }

        .banked-item {
            background: rgba(255,255,255,0.95); border-radius: 8px;
            margin: 3px; padding: 5px; font-size: clamp(0.78rem, 1.2vw, 0.9rem);
            display: flex; align-items: center; width: 95%; color: #000; font-weight: bold;
            box-sizing: border-box;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000; color: white;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
        }
        .start-title {
            font-size: clamp(2.2rem, 6vw, 4rem);
            color: #ffca28;
            margin-bottom: 10px;
        }
        .start-copy {
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            margin-bottom: 40px;
        }
        button {
            padding: clamp(18px, 3vw, 35px) clamp(36px, 8vw, 90px);
            font-size: clamp(1.4rem, 5vw, 3.5rem);
            cursor: pointer;
            background: #e67e22;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px #bf360c;
            max-width: min(90vw, 520px);
        }

        @media (max-width: 1024px) and (orientation: portrait) {
            #game-container {
                flex-direction: column;
            }

            .team-section {
                min-height: 0;
            }

            :root {
                --bank-height: clamp(92px, 14vh, 120px);
            }
        }

        @media (max-width: 900px) {
            .banks {
                gap: 6px;
            }

            .bank {
                border-radius: 12px;
            }
        }

        @media (max-width: 768px) {
            :root {
                --bubble-width: clamp(78px, 18vw, 102px);
                --bubble-height: clamp(58px, 13vw, 76px);
                --bank-height: clamp(88px, 16vh, 110px);
            }

            .team-section {
                border-width: 2px;
            }

            .header {
                border-bottom-width: 2px;
            }

            .word-bubble {
                border-width: 2px;
            }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="start-title">ARTIFACT DIG</h1>
        <p class="start-copy">Touch dirt to see words. Drag to the right age!</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="game-container">
        <div class="team-section" id="team1">
            <div class="header"><h2>TEAM 1</h2><div class="score">Remains: 15</div></div>
            <div class="play-area"></div>
            <div class="banks">
                <div class="bank paleo-bank" data-age="paleo"><div class="bank-title">Paleolithic</div></div>
                <div class="bank neo-bank" data-age="neo"><div class="bank-title">Neolithic</div></div>
                <div class="bank metal-bank" data-age="metal"><div class="bank-title">Metal Age</div></div>
            </div>
        </div>
        <div class="team-section" id="team2">
            <div class="header"><h2>TEAM 2</h2><div class="score">Remains: 15</div></div>
            <div class="play-area"></div>
            <div class="banks">
                <div class="bank paleo-bank" data-age="paleo"><div class="bank-title">Paleolithic</div></div>
                <div class="bank neo-bank" data-age="neo"><div class="bank-title">Neolithic</div></div>
                <div class="bank metal-bank" data-age="metal"><div class="bank-title">Metal Age</div></div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function playDing() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function startBackgroundMusic() {
            const secondsPerBeat = 0.5;
            let beat = 0;
            setInterval(() => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const notes = [110, 110, 130, 110, 146, 110, 130, 123];
                osc.frequency.value = notes[beat % notes.length];
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                beat++;
            }, 500);
        }

        const artifactData = [
            { t: "stone tools", a: "paleo", i: "🪨" }, { t: "knapping", a: "paleo", i: "⚒️" },
            { t: "hunting", a: "paleo", i: "🏹" }, { t: "fishing", a: "paleo", i: "🐟" },
            { t: "gathering", a: "paleo", i: "🧺" }, { t: "pottery", a: "neo", i: "🏺" },
            { t: "hunting", a: "neo", i: "🍖" }, { t: "gathering", a: "neo", i: "🍓" },
            { t: "fishing", a: "neo", i: "🎣" }, { t: "stone tools", a: "neo", i: "🔪" },
            { t: "metal", a: "metal", i: "🛡️" }, { t: "glass", a: "metal", i: "💎" },
            { t: "farming", a: "metal", i: "🌾" }, { t: "hunting", a: "metal", i: "⚔️" },
            { t: "fishing", a: "metal", i: "🛶" }
        ];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBackgroundMusic();
            playDing();
            init('team1');
            init('team2');
        }

        function init(teamId) {
            const area = document.querySelector(`#${teamId} .play-area`);
            const label = document.querySelector(`#${teamId} .score`);
            let count = 15;

            artifactData.forEach((item, idx) => {
                const bubble = document.createElement('div');
                bubble.className = 'word-bubble';
                bubble.innerHTML = `<span>${item.i}</span><span>${item.t}</span>`;
                bubble.style.left = (idx % 4) * 23 + 5 + '%';
                bubble.style.top = Math.floor(idx / 4) * 22 + 5 + '%';

                bubble.addEventListener('pointerdown', function handleDown(e) {
                    if(!bubble.classList.contains('revealed')) {
                        bubble.classList.add('revealed');
                        return;
                    }

                    bubble.setPointerCapture(e.pointerId);
                    bubble.style.zIndex = 1000;

                    const move = (me) => {
                        const r = area.getBoundingClientRect();
                        bubble.style.left = (me.clientX - r.left - bubble.offsetWidth/2) + 'px';
                        bubble.style.top = (me.clientY - r.top - bubble.offsetHeight/2) + 'px';
                    };

                    const up = (ue) => {
                        bubble.releasePointerCapture(ue.pointerId);
                        bubble.removeEventListener('pointermove', move);
                        bubble.removeEventListener('pointerup', up);
                        bubble.style.zIndex = 10;
                        
                        const bR = bubble.getBoundingClientRect();
                        const banks = document.querySelectorAll(`#${teamId} .bank`);
                        
                        banks.forEach(bank => {
                            const r = bank.getBoundingClientRect();
                            if (bR.left < r.right && bR.right > r.left && bR.top < r.bottom && bR.bottom > r.top) {
                                if (bank.dataset.age === item.a) {
                                    playDing();
                                    bubble.remove();
                                    const p = document.createElement('div');
                                    p.className = 'banked-item';
                                    p.innerHTML = `${item.i} <span style="margin-left:8px">${item.t}</span>`;
                                    bank.appendChild(p);
                                    count--;
                                    label.innerText = `Remains: ${count}`;
                                }
                            }
                        });
                    };
                    bubble.addEventListener('pointermove', move);
                    bubble.addEventListener('pointerup', up);
                });
                area.appendChild(bubble);
            });
        }
    </script>
</body>
</html>
