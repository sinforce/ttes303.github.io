<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artifact Dig - Individual Edition</title>
    <style>
        :root {
            --paleo: #8d6e63;
            --neo: #5d4037;
            --metal: #455a64;
            --bubble-width: clamp(92px, 12vw, 150px);
            --bubble-height: clamp(66px, 9vw, 100px);
            --bank-height: clamp(116px, 23vh, 200px);
            --bank-gap: clamp(8px, 1.5vw, 15px);
            --bank-padding: clamp(8px, 1.5vw, 15px);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            overflow: hidden; font-family: "Century Gothic", Futura, sans-serif;
            background-color: #2b1a0a; touch-action: none; user-select: none;
        }
        #game-container {
            display: flex; flex-direction: column; width: 100vw; height: 100vh; height: 100dvh;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Archaeological_dig_site.jpg/1200px-Archaeological_dig_site.jpg');
            background-size: cover; background-position: center;
        }
        .header { 
            text-align: center; color: white; padding: clamp(10px, 2vw, 15px); 
            background: rgba(0,0,0,0.85); border-bottom: 4px solid gold; 
        }
        .header h2 {
            margin: 0;
            font-size: clamp(1.4rem, 4vw, 2.5rem);
        }
        #score {
            font-size: clamp(1rem, 2.2vw, 1.5rem);
            color: gold;
            margin-top: 4px;
        }
        .play-area { flex: 1; min-height: 0; position: relative; }

        .banks { 
            display: flex; height: var(--bank-height); gap: var(--bank-gap); padding: var(--bank-padding); 
            background: rgba(0,0,0,0.9); 
        }
        .bank { 
            flex: 1; min-width: 0; border-radius: 20px; border: 3px solid #fff; 
            display: flex; flex-direction: column; align-items: center; 
            overflow-y: auto; padding: var(--bank-padding); color: white; 
        }
        .bank-title { font-weight: bold; margin-bottom: 8px; font-size: clamp(0.95rem, 2vw, 1.4rem); color: #ffeb3b; }
        .paleo-bank { background-color: var(--paleo); }
        .neo-bank { background-color: var(--neo); }
        .metal-bank { background-color: var(--metal); }

        .word-bubble {
            position: absolute; width: var(--bubble-width); height: var(--bubble-height);
            background: #5d4037; border-radius: 15px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; color: transparent; border: 3px dashed #3e2723;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5); z-index: 10;
            padding: 4px;
            box-sizing: border-box;
            text-align: center;
        }
        .word-bubble.revealed { background: white; color: black; border: 3px solid #333; }
        .word-bubble span:first-child { font-size: clamp(1.5rem, 3vw, 2.5rem); display: none; pointer-events: none;}
        .word-bubble.revealed span:first-child { display: block; }
        .word-bubble span:last-child { pointer-events: none; font-size: clamp(0.78rem, 1.8vw, 1.2rem); line-height: 1.1; }

        .banked-item {
            background: rgba(255,255,255,0.95); border-radius: 8px;
            margin: 4px; padding: 8px; font-size: clamp(0.82rem, 1.8vw, 1.1rem);
            display: flex; align-items: center; width: 90%; color: #000; font-weight: bold;
            box-sizing: border-box;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000; color: white;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
        }
        .start-title {
            font-size: clamp(2.3rem, 7vw, 5rem);
            color: #ffca28;
            margin-bottom: 10px;
        }
        .start-copy {
            font-size: clamp(1rem, 2.7vw, 2rem);
            margin-bottom: 50px;
        }
        button { 
            padding: clamp(20px, 3.2vw, 40px) clamp(40px, 8vw, 100px); font-size: clamp(1.5rem, 5.4vw, 4rem); cursor: pointer; 
            background: #e67e22; border: none; border-radius: 30px; 
            color: white; font-weight: bold; box-shadow: 0 12px #bf360c; 
            max-width: min(90vw, 560px);
        }

        @media (max-width: 1024px) {
            :root {
                --bank-height: clamp(102px, 18vh, 150px);
                --bubble-width: clamp(86px, 15vw, 126px);
                --bubble-height: clamp(62px, 11vw, 88px);
            }
        }

        @media (max-width: 768px) {
            .header {
                border-bottom-width: 2px;
            }

            .bank {
                border-width: 2px;
                border-radius: 14px;
            }

            .word-bubble {
                border-width: 2px;
            }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="start-title">ARTIFACT DIG</h1>
        <p class="start-copy">Touch dirt to see words. Drag to the correct age!</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="game-container">
        <div class="header">
            <h2>ARCHAEOLOGY CHALLENGE</h2>
            <div id="score">Artifacts Remaining: 15</div>
        </div>
        <div class="play-area" id="main-area"></div>
        <div class="banks">
            <div class="bank paleo-bank" data-age="paleo"><div class="bank-title">Paleolithic</div></div>
            <div class="bank neo-bank" data-age="neo"><div class="bank-title">Neolithic</div></div>
            <div class="bank metal-bank" data-age="metal"><div class="bank-title">Metal Age</div></div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function playDing() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function startBackgroundMusic() {
            const beatTime = 0.5;
            let beat = 0;
            setInterval(() => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const notes = [110, 110, 130, 110, 146, 110, 130, 123];
                osc.frequency.value = notes[beat % notes.length];
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                beat++;
            }, 500);
        }

        const artifactData = [
            { t: "stone tools", a: "paleo", i: "🪨" }, { t: "knapping", a: "paleo", i: "⚒️" },
            { t: "hunting", a: "paleo", i: "🏹" }, { t: "fishing", a: "paleo", i: "🐟" },
            { t: "gathering", a: "paleo", i: "🧺" }, { t: "pottery", a: "neo", i: "🏺" },
            { t: "hunting", a: "neo", i: "🍖" }, { t: "gathering", a: "neo", i: "🍓" },
            { t: "fishing", a: "neo", i: "🎣" }, { t: "stone tools", a: "neo", i: "🔪" },
            { t: "metal", a: "metal", i: "🛡️" }, { t: "glass", a: "metal", i: "💎" },
            { t: "farming", a: "metal", i: "🌾" }, { t: "hunting", a: "metal", i: "⚔️" },
            { t: "fishing", a: "metal", i: "🛶" }
        ];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBackgroundMusic();
            playDing();
            initGame();
        }

        function initGame() {
            const area = document.getElementById('main-area');
            const scoreLabel = document.getElementById('score');
            let remaining = 15;

            artifactData.forEach((item, idx) => {
                const bubble = document.createElement('div');
                bubble.className = 'word-bubble';
                bubble.innerHTML = `<span>${item.i}</span><span>${item.t}</span>`;
                
                // Spread items across the larger screen
                bubble.style.left = (idx % 5) * 18 + 5 + '%';
                bubble.style.top = Math.floor(idx / 5) * 25 + 5 + '%';

                bubble.addEventListener('pointerdown', function(e) {
                    if(!bubble.classList.contains('revealed')) {
                        bubble.classList.add('revealed');
                        return;
                    }

                    bubble.setPointerCapture(e.pointerId);
                    bubble.style.zIndex = 1000;

                    const move = (me) => {
                        const r = area.getBoundingClientRect();
                        bubble.style.left = (me.clientX - r.left - bubble.offsetWidth/2) + 'px';
                        bubble.style.top = (me.clientY - r.top - bubble.offsetHeight/2) + 'px';
                    };

                    const up = (ue) => {
                        bubble.releasePointerCapture(ue.pointerId);
                        bubble.removeEventListener('pointermove', move);
                        bubble.removeEventListener('pointerup', up);
                        bubble.style.zIndex = 10;
                        
                        const bRect = bubble.getBoundingClientRect();
                        const banks = document.querySelectorAll('.bank');
                        
                        banks.forEach(bank => {
                            const r = bank.getBoundingClientRect();
                            if (bRect.left < r.right && bRect.right > r.left && bRect.top < r.bottom && bRect.bottom > r.top) {
                                if (bank.dataset.age === item.a) {
                                    playDing();
                                    bubble.remove();
                                    const entry = document.createElement('div');
                                    entry.className = 'banked-item';
                                    entry.innerHTML = `${item.i} <span style="margin-left:10px">${item.t}</span>`;
                                    bank.appendChild(entry);
                                    remaining--;
                                    scoreLabel.innerText = `Artifacts Remaining: ${remaining}`;
                                    if(remaining === 0) alert("EXCELLENT WORK, MASTER ARCHAEOLOGIST!");
                                }
                            }
                        });
                    };
                    bubble.addEventListener('pointermove', move);
                    bubble.addEventListener('pointerup', up);
                });
                area.appendChild(bubble);
            });
        }
    </script>
</body>
</html>
